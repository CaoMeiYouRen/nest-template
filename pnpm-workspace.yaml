packages:
  - .

overrides:
  '@types/superagent': ^8.1.0
  '@typegoose/typegoose': $@typegoose/typegoose
  mongodb: $mongodb
  mongoose: $mongoose
  formidable: ^3.2.4
  fast-xml-parser: ^4.4.1
  cookie: ^0.7.0
  '@babel/helpers': ^7.26.10
  brace-expansion: ^2.0.3
  tmp: ^0.2.4
  validator: ^13.15.20
  glob: ^11.1.0

peerDependencyRules:
  ignoreMissing:
    - '@types/mongoose'
    - express
    - mongodb
    - webpack

allowBuilds:
  '@nestjs/core': true
  '@scarf/scarf': true
  unrs-resolver: true

strictPeerDependencies: false
